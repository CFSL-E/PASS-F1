name: Flutter Build & Preview

on:
  push:
    branches:
      - main  # 如果你的主分支名为 master，请修改为 master
  workflow_dispatch: # 允许手动触发构建

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. 检出代码
      - uses: actions/checkout@v4

      # 2. 设置 Flutter 环境
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x' # 自动使用最新的 3.x 版本
          channel: 'stable'
          cache: true # 开启缓存以加快后续构建速度

      # 3. 获取依赖
      # 根据你提供的 pubspec.yaml，项目名为 password_manager
      - name: Install dependencies
        run: flutter pub get
        # 如果你的项目在子目录（如 code/），请取消下面这行的注释并修改路径
        # working-directory: code

      # 4. 构建 Web 版本（最适合快速 UI 预览）
      - name: Build Web
        run: flutter build web --release --base-href "/${{ github.event.repository.name }}/"
        # working-directory: code

      # 5. 构建 Android APK（适合真机体验）
      - name: Build APK
        run: flutter build apk --split-per-abi
        # working-directory: code

      # 6. 将 Web 产物部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build/web # 如果有子目录，请改为 ./code/build/web

      # 7. 将 APK 上传为 Artifact（可在 Action 页面下载）
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/*.apk # 如果有子目录，请加上路径前缀
