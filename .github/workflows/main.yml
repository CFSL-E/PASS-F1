name: Flutter Full Auto Repair & Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Android 构建必须

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      # 核心修复步骤：自动寻找项目根目录并初始化
      - name: Auto Repair Project Structure
        run: |
          # 寻找 pubspec.yaml 所在的真实路径
          PROJECT_ROOT=$(find . -name "pubspec.yaml" -exec dirname {} \;)
          echo "PROJECT_DIR=$PROJECT_ROOT" >> $GITHUB_ENV
          echo "Found project at: $PROJECT_ROOT"
          
          cd $PROJECT_ROOT
          # 一次性补全所有缺失的平台文件夹 (android, web)
          flutter create . --platforms android,web --overwrite
          
          # 确保依赖同步
          flutter pub get

      - name: Build Web Preview
        run: |
          cd ${{ env.PROJECT_DIR }}
          flutter build web --release --base-href "/${{ github.event.repository.name }}/"

      - name: Build Android APK
        run: |
          cd ${{ env.PROJECT_DIR }}
          # 这里的 build 会使用刚才自动生成的 Gradle 配置
          flutter build apk --release --split-per-abi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ${{ env.PROJECT_DIR }}/build/web

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pass-app-apk
          path: ${{ env.PROJECT_DIR }}/build/app/outputs/flutter-apk/*.apk
