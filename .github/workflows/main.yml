steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: code # 如果你的 pubspec.yaml 在 code 目录下，请保留此行

      # --- 新增步骤：为项目自动生成 Web 配置文件 ---
      - name: Enable Web Support
        run: flutter create . --platforms web
        working-directory: code 

      - name: Build Web
        # 注意：这里的 --base-href 必须和你的仓库名一致才能正确加载资源
        run: flutter build web --release --base-href "/PASS-F1/"
        working-directory: code

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./code/build/web # 注意路径需包含 code
